{% extends "base.html" %}

{% block title %}首页 - 哔哩哔哩关注列表管理工具{% endblock %}

{% block content %}
<div class="row">
    <!-- 欢迎区域 -->
    <div class="col-12 mb-4">
        <div class="card border-0 bg-gradient-primary text-white">
            <div class="card-body p-5">
                <div class="row align-items-center">
                    <div class="col-md-8">
                        <h1 class="display-5 fw-bold mb-3">
                            <i class="bi bi-tv"></i>
                            哔哩哔哩关注列表管理工具
                        </h1>
                        <p class="lead mb-4">
                            智能管理你的关注列表，支持批量操作、数据分析和自动分类
                        </p>
                        <div class="d-flex gap-3">
                            <button id="sync-btn" class="btn btn-light btn-lg">
                                <i class="bi bi-arrow-clockwise"></i>
                                同步关注列表
                            </button>
                            <a href="/following" class="btn btn-outline-light btn-lg">
                                <i class="bi bi-people"></i>
                                查看关注
                            </a>
                        </div>
                    </div>
                    <div class="col-md-4 text-center">
                        <i class="bi bi-graph-up-arrow display-1 opacity-75"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 统计卡片 -->
    <div class="col-xl-3 col-md-6 mb-4">
        <div class="card border-left-primary shadow h-100 py-2">
            <div class="card-body">
                <div class="row no-gutters align-items-center">
                    <div class="col mr-2">
                        <div class="text-xs font-weight-bold text-primary text-uppercase mb-1">
                            总关注数
                        </div>
                        <div class="h5 mb-0 font-weight-bold text-gray-800" id="total-following">
                            <span class="spinner-border spinner-border-sm"></span>
                        </div>
                    </div>
                    <div class="col-auto">
                        <i class="bi bi-people h2 text-gray-300"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="col-xl-3 col-md-6 mb-4">
        <div class="card border-left-success shadow h-100 py-2">
            <div class="card-body">
                <div class="row no-gutters align-items-center">
                    <div class="col mr-2">
                        <div class="text-xs font-weight-bold text-success text-uppercase mb-1">
                            已分类
                        </div>
                        <div class="h5 mb-0 font-weight-bold text-gray-800" id="categorized-count">
                            <span class="spinner-border spinner-border-sm"></span>
                        </div>
                    </div>
                    <div class="col-auto">
                        <i class="bi bi-tags h2 text-gray-300"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="col-xl-3 col-md-6 mb-4">
        <div class="card border-left-info shadow h-100 py-2">
            <div class="card-body">
                <div class="row no-gutters align-items-center">
                    <div class="col mr-2">
                        <div class="text-xs font-weight-bold text-info text-uppercase mb-1">
                            活跃用户
                        </div>
                        <div class="h5 mb-0 font-weight-bold text-gray-800" id="active-count">
                            <span class="spinner-border spinner-border-sm"></span>
                        </div>
                    </div>
                    <div class="col-auto">
                        <i class="bi bi-activity h2 text-gray-300"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="col-xl-3 col-md-6 mb-4">
        <div class="card border-left-warning shadow h-100 py-2">
            <div class="card-body">
                <div class="row no-gutters align-items-center">
                    <div class="col mr-2">
                        <div class="text-xs font-weight-bold text-warning text-uppercase mb-1">
                            待处理
                        </div>
                        <div class="h5 mb-0 font-weight-bold text-gray-800" id="pending-count">
                            <span class="spinner-border spinner-border-sm"></span>
                        </div>
                    </div>
                    <div class="col-auto">
                        <i class="bi bi-exclamation-triangle h2 text-gray-300"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <!-- 分类分布图表 -->
    <div class="col-lg-6 mb-4">
        <div class="card shadow">
            <div class="card-header py-3 d-flex justify-content-between align-items-center">
                <h6 class="m-0 font-weight-bold text-primary">
                    <i class="bi bi-pie-chart"></i>
                    分类分布
                </h6>
                <a href="/analysis" class="btn btn-sm btn-outline-primary">
                    查看详情
                </a>
            </div>
            <div class="card-body">
                <canvas id="categoryChart" width="400" height="300"></canvas>
            </div>
        </div>
    </div>

    <!-- 关注趋势图表 -->
    <div class="col-lg-6 mb-4">
        <div class="card shadow">
            <div class="card-header py-3 d-flex justify-content-between align-items-center">
                <h6 class="m-0 font-weight-bold text-primary">
                    <i class="bi bi-graph-up"></i>
                    关注趋势
                </h6>
                <a href="/analysis" class="btn btn-sm btn-outline-primary">
                    查看详情
                </a>
            </div>
            <div class="card-body">
                <canvas id="trendChart" width="400" height="300"></canvas>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <!-- 最近关注 -->
    <div class="col-lg-8 mb-4">
        <div class="card shadow">
            <div class="card-header py-3 d-flex justify-content-between align-items-center">
                <h6 class="m-0 font-weight-bold text-primary">
                    <i class="bi bi-clock-history"></i>
                    最近关注
                </h6>
                <a href="/following" class="btn btn-sm btn-outline-primary">
                    查看全部
                </a>
            </div>
            <div class="card-body">
                <div id="recent-following" class="list-group list-group-flush">
                    <div class="text-center py-4">
                        <div class="spinner-border" role="status">
                            <span class="visually-hidden">加载中...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 快速操作 -->
    <div class="col-lg-4 mb-4">
        <div class="card shadow">
            <div class="card-header py-3">
                <h6 class="m-0 font-weight-bold text-primary">
                    <i class="bi bi-lightning"></i>
                    快速操作
                </h6>
            </div>
            <div class="card-body">
                <div class="d-grid gap-3">
                    <button class="btn btn-outline-primary" onclick="startSync()">
                        <i class="bi bi-arrow-clockwise"></i>
                        同步关注列表
                    </button>
                    <button class="btn btn-outline-success" onclick="autoCategories()">
                        <i class="bi bi-tags"></i>
                        自动分类
                    </button>
                    <button class="btn btn-outline-info" onclick="generateReport()">
                        <i class="bi bi-file-earmark-text"></i>
                        生成分析报告
                    </button>
                    <a href="/settings" class="btn btn-outline-secondary">
                        <i class="bi bi-gear"></i>
                        配置设置
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 同步进度模态框 -->
<div class="modal fade" id="syncModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="bi bi-arrow-clockwise"></i>
                    同步关注列表
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="text-center">
                    <div class="spinner-border mb-3" role="status"></div>
                    <p id="sync-status">正在同步关注列表...</p>
                    <div class="progress">
                        <div id="sync-progress" class="progress-bar" role="progressbar" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="/static/js/index.js"></script>
{% endblock %}
