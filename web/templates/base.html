<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}哔哩哔哩关注列表管理工具{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/img/bilibili-logo.svg">
    <link rel="shortcut icon" type="image/svg+xml" href="/static/img/bilibili-logo.svg">

    <!-- CSS样式 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">

    {% block extra_css %}{% endblock %}
</head>

<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="/static/img/bilibili-logo.svg" alt="B站" width="24" height="24" class="me-2">
                哔哩哔哩关注管理
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">
                            <i class="bi bi-house"></i> 首页
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/following">
                            <i class="bi bi-people"></i> 关注列表
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/groups">
                            <i class="bi bi-collection"></i> 分组管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/analysis">
                            <i class="bi bi-graph-up"></i> 数据分析
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/user-stats">
                            <i class="bi bi-bar-chart"></i> UP主统计数据
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/settings">
                            <i class="bi bi-gear"></i> 设置
                        </a>
                    </li>
                </ul>

                <!-- 通知设置和状态指示器 -->
                <div class="navbar-text d-flex align-items-center gap-2">
                    <button class="btn btn-outline-light btn-sm" id="notification-settings-btn" title="通知设置">
                        <i class="bi bi-bell"></i>
                    </button>
                    <span id="status-indicator" class="badge bg-secondary">
                        <i class="bi bi-circle-fill"></i> 未连接
                    </span>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主要内容区域 -->
    <main class="container-fluid py-4">
        <!-- 消息提示区域 -->
        <div id="message-container"></div>

        {% block content %}{% endblock %}
    </main>

    <!-- 页脚 -->
    <footer class="bg-light py-4 mt-5">
        <div class="container text-center">
            <p class="text-muted mb-2">
                哔哩哔哩关注列表管理工具 v1.0.0 |
                <a href="https://github.com/YZz-S/Bilibili-batch-operation-tool" target="_blank">
                    <i class="bi bi-github"></i> GitHub
                </a>
            </p>
            <p class="text-muted small mb-0">
                <span class="text-warning">
                    <i class="bi bi-exclamation-triangle"></i>
                    本工具仅供学习研究使用，使用风险自担
                </span>
                |
                <a href="#" data-bs-toggle="modal" data-bs-target="#disclaimerModal" class="text-decoration-none">
                    <i class="bi bi-file-text"></i> 免责声明
                </a>
                |
                <span>Apache 2.0 许可证</span>
            </p>
        </div>
    </footer>

    <!-- JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/js/common.js"></script>

    {% block extra_js %}{% endblock %}
</body>

</html>
